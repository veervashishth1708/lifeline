version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: antigravity_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-antigravity}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: antigravity_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: antigravity_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-antigravity}
      REDIS_URL: redis://redis:6379/0
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
